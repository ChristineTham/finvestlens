name: CI

# Builds and tests the Swift packages on every push / PR (NFR-08). Every package
# declares swift-tools-version 6.2, which ships with Xcode 26, so all jobs select
# it explicitly rather than relying on the runner's default Xcode. The
# correctness-critical packages (engine, persistence, interchange, quotes, rules,
# reports, shared) build and test on their own; the full app target and the
# Intelligence package additionally need the macOS 26 SDK (FoundationModels) and
# are built in a separate, allowed-to-fail job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packages:
    name: Test SPM packages
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - Engine
          - Persistence
          - Interchange
          - Quotes
          - Rules
          - Reports
          - Shared
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26 (Swift 6.2)
        run: |
          app=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$app" ]; then
            echo "::error::No Xcode 26 found on the runner; packages need Swift tools 6.2."
            ls -d /Applications/Xcode_*.app 2>/dev/null || true
            exit 1
          fi
          echo "Selecting $app"
          sudo xcode-select -s "$app"
      - name: Swift version
        run: swift --version
      - name: Build
        working-directory: Packages/${{ matrix.package }}
        run: swift build
      - name: Test
        working-directory: Packages/${{ matrix.package }}
        run: swift test

  license-headers:
    name: SPDX license header check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every Swift source carries an SPDX header
        run: |
          missing=0
          while IFS= read -r -d '' file; do
            if ! grep -q "SPDX-License-Identifier: GPL-3.0-or-later" "$file"; then
              echo "::error file=$file::missing SPDX-License-Identifier header"
              missing=1
            fi
          done < <(find Packages FinvestLensWidgets FinvestLensQuickLook \
                     -name '*.swift' -not -path '*/.build/*' -print0 2>/dev/null)
          exit $missing

  app:
    name: Build app (macOS 26 SDK — allowed to fail)
    runs-on: macos-15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26 (Swift 6.2 / macOS 26 SDK)
        run: |
          app=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$app" ]; then
            echo "::error::No Xcode 26 found on the runner; the app needs the macOS 26 SDK."
            ls -d /Applications/Xcode_*.app 2>/dev/null || true
            exit 1
          fi
          echo "Selecting $app"
          sudo xcode-select -s "$app"
      - name: Swift version
        run: swift --version
      - name: Build app + extensions (unsigned)
        run: |
          xcodebuild build \
            -scheme finvestlens \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
